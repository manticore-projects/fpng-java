name: FPNG-Java CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:

  # ── Lint & check (Java only, no native) ───────────────────────────
  ci:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle check
        uses: gradle/actions/setup-gradle@v4
        with:
          arguments: check -x :maven-test:test

  # ── Build native libs on each platform ────────────────────────────
  build-native:
    name: Native (${{ matrix.os }})
    needs: ci
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build FPNG and FPNGE native libs
        uses: gradle/actions/setup-gradle@v4
        with:
          arguments: :fpng:assemble :fpnge:assemble

      - name: Upload FPNG native artifact
        uses: actions/upload-artifact@v4
        with:
          name: fpng-${{ matrix.os }}
          path: |
            fpng/build/lib/main/release/shared/**/stripped/*.dylib
            fpng/build/lib/main/release/shared/**/*.dll
            fpng/build/lib/main/release/shared/**/stripped/*.so

      - name: Upload FPNGE native artifact
        uses: actions/upload-artifact@v4
        with:
          name: fpnge-${{ matrix.os }}
          path: |
            fpnge/build/lib/main/release/shared/**/stripped/*.dylib
            fpnge/build/lib/main/release/shared/**/*.dll
            fpnge/build/lib/main/release/shared/**/stripped/*.so

  # ── Bundle native libs into JARs and publish ──────────────────────
  publish:
    name: Publish
    needs: build-native
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compile Java modules
        uses: gradle/actions/setup-gradle@v4
        with:
          arguments: :fpng-java:compileJava :fpnge-java:compileJava

      - name: Download all FPNG native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: fpng-*
          path: fpng-java/build/resources/main/lib/fpng
          merge-multiple: true

      - name: Download all FPNGE native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: fpnge-*
          path: fpnge-java/build/resources/main/lib/fpnge
          merge-multiple: true

      - name: Verify native libs
        run: |
          echo "── FPNG native libs ──"
          find fpng-java/build/resources/main/lib -type f | sort
          echo "── FPNGE native libs ──"
          find fpnge-java/build/resources/main/lib -type f | sort

      - name: Install Gradle properties
        env:
          GRADLE_PROPERTIES: ${{ secrets.GRADLE_PROPERTIES }}
        shell: bash
        run: |
          mkdir -p ~/.gradle/
          echo "GRADLE_USER_HOME=${HOME}/.gradle" >> $GITHUB_ENV
          echo "${GRADLE_PROPERTIES}" > ~/.gradle/gradle.properties

      - name: Install GPG signing key
        run: |
          echo -e "${{ secrets.GPG_SECRET_KEY }}" | gpg --batch --import
          gpg --export-secret-keys -o ~/.gnupg/secring.gpg

      - name: Publish to GitHub Packages and Maven Central
        uses: gradle/actions/setup-gradle@v4
        with:
          arguments: :encoder-java:publish :fpng-java:publish :fpnge-java:publish
        env:
          USERNAME: ${{ github.actor }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Integration test against published artifacts ──────────────────
  test:
    name: Integration test (${{ matrix.os }})
    needs: publish
    continue-on-error: true
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run maven-test suite
        uses: gradle/actions/setup-gradle@v4
        with:
          arguments: --no-build-cache --refresh-dependencies :maven-test:test