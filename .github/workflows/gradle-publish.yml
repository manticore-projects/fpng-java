name: FPNG-Java CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:

  # ── Lint & check (Java only, no native) ───────────────────────────
  ci:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 23
        uses: actions/setup-java@v5
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Gradle check
        run: ./gradlew check -x :maven-test:check

  # ── Build native libs on each platform ────────────────────────────
  # Expiration: The macos-15-intel label works until August 2027. After that, GitHub drops x86_64 macOS runners entirely.
  build-native:
    name: Native (${{ matrix.os }})
    needs: ci
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-15-intel ]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 23
        uses: actions/setup-java@v5
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build FPNG and FPNGE native libs
        run: ./gradlew :fpng:assemble :fpnge:assemble

      # Stage each native lib into a flat directory BEFORE upload.
      #
      # Why: upload-artifact@v4+ strips the non-glob prefix and preserves the
      # sub-hierarchy. Globbing directly from Gradle's build dir would ship
      # artifacts with internal paths like `stripped/libfpng.so`, which after
      # download land in nested subdirectories that neither the jar task nor
      # JNA looks at. Staging flat + uploading `staging-xxx/*` puts the bare
      # library file at the artifact root, so merge-multiple on download
      # assembles all three platforms' libs flat.
      - name: Stage FPNG native lib
        shell: bash
        run: |
          mkdir -p staging-fpng
          find fpng/build/lib/main/release -type f \( \
                -path '*/stripped/libfpng.so' \
             -o -path '*/stripped/libfpng.dylib' \
             -o -name 'fpng.dll' \
          \) -exec cp {} staging-fpng/ \;
          echo "── Staged FPNG ──"
          ls -la staging-fpng

      - name: Stage FPNGE native lib
        shell: bash
        run: |
          mkdir -p staging-fpnge
          find fpnge/build/lib/main/release -type f \( \
                -path '*/stripped/libfpnge.so' \
             -o -path '*/stripped/libfpnge.dylib' \
             -o -name 'fpnge.dll' \
          \) -exec cp {} staging-fpnge/ \;
          echo "── Staged FPNGE ──"
          ls -la staging-fpnge

      - name: Upload FPNG native artifact
        uses: actions/upload-artifact@v7
        with:
          name: fpng-${{ matrix.os }}
          if-no-files-found: error
          path: staging-fpng/*

      - name: Upload FPNGE native artifact
        uses: actions/upload-artifact@v7
        with:
          name: fpnge-${{ matrix.os }}
          if-no-files-found: error
          path: staging-fpnge/*

  # ── Bundle native libs into JARs and publish ──────────────────────
  publish:
    name: Publish
    needs: build-native
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 23
        uses: actions/setup-java@v5
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      # Download pre-built native libs into src/main/resources — NOT build/.
      #
      # Putting them in build/resources/main/ causes Gradle's stale-output
      # cleanup on processResources to delete them: processResources declares
      # build/resources/main/ as its output directory, and since the downloaded
      # files aren't produced by a tracked task, they get wiped before the jar
      # task runs.
      #
      # Putting them in src/main/resources/lib/<name>/ makes them legitimate
      # source resources. processResources copies them into build/resources/main/
      # itself, so Gradle tracks them as its own outputs and the jar task picks
      # them up. The native libs ship at the JAR path `lib/<name>/<file>`.
      - name: Download all FPNG native artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: fpng-*
          path: fpng-java/src/main/resources/lib/fpng
          merge-multiple: true

      - name: Download all FPNGE native artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: fpnge-*
          path: fpnge-java/src/main/resources/lib/fpnge
          merge-multiple: true

      # Verify each project got exactly one file per platform extension.
      # Fails loudly if a platform upload was empty, missed its glob, or a
      # naming drift slipped in — instead of silently publishing a JAR with
      # a missing native.
      - name: Verify native libs
        shell: bash
        run: |
          echo "── FPNG native libs (src/main/resources) ──"
          find fpng-java/src/main/resources/lib -type f | sort
          echo "── FPNGE native libs (src/main/resources) ──"
          find fpnge-java/src/main/resources/lib -type f | sort

          for name in fpng fpnge; do
            dir="${name}-java/src/main/resources/lib/${name}"
            for ext in so dylib dll; do
              count=$(find "$dir" -maxdepth 1 -type f -name "*.${ext}" | wc -l)
              if [ "$count" -ne 1 ]; then
                echo "ERROR: expected exactly 1 .${ext} file in ${dir}, found ${count}"
                exit 1
              fi
            done
          done
          echo "── All six native libs present (fpng + fpnge × so/dylib/dll) ──"

      - name: Install Gradle properties
        env:
          GRADLE_PROPERTIES: ${{ secrets.GRADLE_PROPERTIES }}
        run: |
          mkdir -p ~/.gradle
          printf '%s\n' "$GRADLE_PROPERTIES" > ~/.gradle/gradle.properties
          echo "GRADLE_USER_HOME=$HOME/.gradle" >> "$GITHUB_ENV"

      - name: Install GPG signing key
        env:
          GPG_SECRET_KEY: ${{ secrets.OSSRH_GPG_SECRET_KEY }}
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          printf '%s\n' "$GPG_SECRET_KEY" | gpg --batch --import
          gpg --export-secret-keys -o ~/.gnupg/secring.gpg

      # Skip copyNativeLib — native libs are already in place under
      # src/main/resources/ from artifact download, and processResources will
      # copy them into build/resources/main/ for us. Without -x, compileJava
      # triggers copyNativeLib -> :fpng:assemble -> C++ build, which on the
      # Linux publish runner would overwrite our multi-platform artifacts
      # with a linux-only .so.
      - name: Publish to GitHub Packages and Maven Central
        run: >-
          ./gradlew
          :encoder-java:publish
          :fpng-java:publish
          :fpnge-java:publish
          :fpng-java23:publish
          closeAndReleaseSonatypeStagingRepository
          -x :fpng:copyNativeLib
          -x :fpnge:copyNativeLib
        env:
          USERNAME: ${{ github.actor }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Post-publish sanity check: dump the contents of the built JARs so a
      # human glancing at the workflow log can confirm the native libs are in
      # there. If these show only .class files, something silently ate the
      # natives and the published artifact is broken.
      - name: Inspect built JARs
        shell: bash
        run: |
          for name in fpng fpnge; do
            jar="$(find ${name}-java/build/libs -name "${name}-java-*.jar" \
                   ! -name '*-sources.jar' ! -name '*-javadoc.jar' | head -1)"
            echo "── ${jar} ──"
            unzip -l "$jar" | grep -E 'lib/|\.(so|dylib|dll)$' || echo "WARNING: no native libs found in $jar"
          done

  # ── Integration test against published artifacts ──────────────────
  # Expiration: The macos-15-intel label works until August 2027. After that, GitHub drops x86_64 macOS runners entirely.
  test:
    name: Integration test (${{ matrix.os }})
    needs: publish
    continue-on-error: true
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-15-intel ]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 23
        uses: actions/setup-java@v5
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run maven-test suite
        run: ./gradlew --no-build-cache --refresh-dependencies :maven-test:test