name: ZPNG CI/CD

# Runs in parallel with the FPNG/FPNGE workflow. ZPNG is the only project in
# this repo with full ARM64 support (see zpng.cc's NEON paths and the per-
# arch toolchain selection in zpng/build.gradle), so the ARM-capable matrix
# lives here rather than in the FPNG/FPNGE workflow.
#
# When FPNG/FPNGE eventually gain ARM support, this file can be merged back
# into the main workflow, or both can stay separate — they don't share any
# state, only the publish step independently pushes its own artifacts.

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:

  # === Lint & check (Java only, no native) =============================
  ci:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 23
        uses: actions/setup-java@v5
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Gradle check (ZPNG modules only)
        run: ./gradlew :zpng-java:check :zpng-java23:check -x :maven-test:check

  # === Build native libs on each platform / architecture ===============
  #
  # Six runners, six binaries — each builds its own native arch.
  # No cross-compilation in CI.
  #
  #   ubuntu-latest      Linux x86_64       -> linux/x86-64/stripped/libzpng.so
  #   ubuntu-24.04-arm   Linux aarch64      -> linux/aarch64/stripped/libzpng.so
  #   windows-latest     Windows x86_64     -> windows/x86-64/zpng.dll
  #   windows-11-arm     Windows aarch64    -> windows/aarch64/zpng.dll
  #   macos-15-intel     macOS x86_64       -> macos/x86-64/stripped/libzpng.dylib
  #   macos-latest       macOS aarch64 (M)  -> macos/aarch64/stripped/libzpng.dylib
  #
  # Why native rather than cross-compile from x86 hosts:
  #   - Each binary is built by the target arch's actual native toolchain,
  #     running on the target hardware. Eliminates cross-toolchain risk
  #     entirely (no question of "does the cross compiler produce code
  #     equivalent to the native compiler").
  #   - GitHub now offers ARM-host runners for all three OSes (GA in public
  #     repos August 2025), and the cmake-based build (replaces Gradle's
  #     cpp-library plugin throughout the repo) sidesteps cpp-library's
  #     broken Windows ARM64 / native-platform support (gradle/gradle#21703).
  #
  # Note: this matrix had only 5 entries previously because cpp-library
  # (still used by fpng/fpnge at that time) crashed on Windows ARM64 during
  # configuration of ANY project, killing zpng's build too. Once fpng/fpnge
  # were ported to cmake, cpp-library disappeared from the repo entirely
  # and Windows ARM64 became viable.
  #
  # Expiration / availability notes:
  #   - macos-15-intel:  Intel macOS runners deprecated. Label valid until
  #                      August 2027; GitHub drops x86_64 macOS entirely after.
  #   - macos-latest:    Apple Silicon (arm64) since runner-images update
  #                      in mid-2024.
  #   - ubuntu-24.04-arm and windows-11-arm: GA in public repos August 2025,
  #                      in private repos January 2026.
  build-native:
    name: Native ZPNG (${{ matrix.os }})
    needs: ci
    strategy:
      # Don't cancel all six on a single failure — diagnosing a Windows-arm
      # specific problem shouldn't depend on whether macOS-arm passed.
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - windows-latest
          - windows-11-arm
          - macos-15-intel
          - macos-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 23
        uses: actions/setup-java@v5
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      # stageNativeLibForJar (defined in zpng/build.gradle) builds zlib-ng,
      # then libzpng, for the host's native architecture. Output ends up at
      #   build/native-jar-staging/<os>/<arch>/[stripped/]<lib>
      # where the path components are determined by the host. No platform
      # detection in this workflow file — host detection lives entirely in
      # zpng/build.gradle.
      - name: Build and stage ZPNG native lib
        run: ./gradlew :zpng:stageNativeLibForJar

      - name: Upload ZPNG native artifact
        uses: actions/upload-artifact@v7
        with:
          name: zpng-${{ matrix.os }}
          if-no-files-found: error
          path: zpng/build/native-jar-staging/**

  # === Bundle native libs into JARs and publish ========================
  publish:
    name: Publish ZPNG
    needs: build-native
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 23
        uses: actions/setup-java@v5
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      # Download into src/main/resources/lib/zpng/ — NOT build/resources/.
      # processResources owns build/resources/main/ and would delete files
      # there that aren't produced by a tracked task. Putting them under
      # src/main/resources makes them legitimate source resources that
      # processResources copies through into the JAR.
      #
      # Each runner's artifact contains <os>/<arch>/[stripped/]<file>.
      # merge-multiple overlays all six runners' trees into one. Both
      # zpng-java (JNA wrapper) and zpng-java23 (FFM wrapper) need the same
      # native binaries, so we drop the same tree under each.
      - name: Download all ZPNG native artifacts (for JNA wrapper)
        uses: actions/download-artifact@v8
        with:
          pattern: zpng-*
          path: zpng-java/src/main/resources/lib/zpng
          merge-multiple: true

      - name: Download all ZPNG native artifacts (for FFM wrapper)
        uses: actions/download-artifact@v8
        with:
          pattern: zpng-*
          path: zpng-java23/src/main/resources/lib/zpng
          merge-multiple: true

      # Fail fast if any platform's lib didn't make it. Last line of defense
      # before signing — much better than publishing a broken JAR.
      #
      # Both wrappers must have all six binaries because zpng-java (JNA) and
      # zpng-java23 (FFM) are independent JARs that each load libzpng on
      # their own. Whichever wrapper a downstream user picks, every runtime
      # platform must work.
      - name: Verify native libs
        shell: bash
        run: |
          echo "=== zpng-java (JNA) ==="
          find zpng-java/src/main/resources/lib -type f | sort
          echo "=== zpng-java23 (FFM) ==="
          find zpng-java23/src/main/resources/lib -type f | sort

          fail=0
          for module in zpng-java zpng-java23; do
            base="${module}/src/main/resources/lib/zpng"
            for expected in \
                "linux/x86-64/stripped/libzpng.so" \
                "linux/aarch64/stripped/libzpng.so" \
                "macos/x86-64/stripped/libzpng.dylib" \
                "macos/aarch64/stripped/libzpng.dylib" \
                "windows/x86-64/zpng.dll" \
                "windows/aarch64/zpng.dll"; do
              if [ ! -f "${base}/${expected}" ]; then
                echo "ERROR: missing ${base}/${expected}" >&2
                fail=1
              fi
            done
          done
          [ "$fail" -eq 0 ] || exit 1

      - name: Install Gradle properties
        env:
          GRADLE_PROPERTIES: ${{ secrets.GRADLE_PROPERTIES }}
        run: |
          mkdir -p ~/.gradle
          printf '%s\n' "$GRADLE_PROPERTIES" > ~/.gradle/gradle.properties
          echo "GRADLE_USER_HOME=$HOME/.gradle" >> "$GITHUB_ENV"

      - name: Install GPG signing key
        env:
          GPG_SECRET_KEY: ${{ secrets.OSSRH_GPG_SECRET_KEY }}
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          printf '%s\n' "$GPG_SECRET_KEY" | gpg --batch --import
          gpg --export-secret-keys -o ~/.gnupg/secring.gpg

      # Skip copyNativeLib — it's a local-dev convenience that on the Linux
      # publish runner would only produce Linux libs and write them over the
      # multi-platform tree we just assembled in src/main/resources/.
      #
      # Note: closeAndReleaseSonatypeStagingRepository is intentionally NOT
      # called here. With FPNG/FPNGE and ZPNG publishing from separate
      # parallel workflows on the same push, neither workflow can safely
      # close-and-release: whichever ran first would strand the other's
      # artifacts in an open staging repo. Run close-and-release manually
      # once both workflows have completed, e.g.
      #
      #   ./gradlew closeAndReleaseSonatypeStagingRepository
      #
      # from a local checkout against the published GRADLE_PROPERTIES.
      # encoder-java is shared infrastructure that fpng-java, fpnge-java,
      # zpng-java, etc. all depend on for common base classes. The
      # FPNG/FPNGE workflow already publishes it; we exclude it here to
      # avoid double-publishing the same artifact (which Sonatype rejects
      # the second time around with "already exists" if not careful).
      - name: Publish ZPNG JARs to GitHub Packages and Maven Central
        run: >-
          ./gradlew
          :zpng-java:publish
          :zpng-java23:publish
          -x :zpng-java:test
          -x :zpng-java:check
          -x :zpng-java23:test
          -x :zpng-java23:check
          -x :zpng:copyNativeLib
          -x :zpng:stageNativeLibForJar
          -x :encoder-java:publish
          -x :encoder-java:publishMavenJavaPublicationToMavenLocal
          -x :encoder-java:publishMavenJavaPublicationToSonatypeRepository
        env:
          USERNAME: ${{ github.actor }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Diagnostic: dump the JAR contents so a human can eyeball at-a-glance
      # that the natives shipped at the right paths for both wrappers.
      - name: Inspect built JARs
        shell: bash
        run: |
          for module in zpng-java zpng-java23; do
            jar="$(find ${module}/build/libs -name "${module}-*.jar" \
                   ! -name '*-sources.jar' ! -name '*-javadoc.jar' | head -1)"
            echo "=== ${jar} ==="
            unzip -l "$jar" | grep -E '\.(so|dylib|dll)$' \
              || echo "WARNING: no native libs found in $jar"
          done

  # === Integration test against published artifacts ====================
  #
  # Same matrix as build-native — verifies the published JAR loads and runs
  # on every supported (OS, arch) combination, not just the one that built
  # each binary.
  # Integration tests run on the actual target platforms. Unlike build-native
  # (where x86 hosts cross-compile for ARM), integration tests need to verify
  # the cross-compiled ARM binaries actually work natively — so we run on
  # ARM-host runners here.
  test:
    name: Integration test ZPNG (${{ matrix.os }})
    needs: publish
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - windows-latest
          - windows-11-arm
          - macos-15-intel
          - macos-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 23
        uses: actions/setup-java@v5
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run maven-test suite
        run: ./gradlew --no-build-cache --refresh-dependencies :maven-test:test