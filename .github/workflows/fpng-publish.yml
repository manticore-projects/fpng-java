name: FPNG / FPNGE CI/CD

# This workflow handles the original FPNG (Geldreich) and FPNGE (Google)
# encoders. ZPNG (zlib-ng backed, ARM64-capable) lives in a separate workflow:
# .github/workflows/zpng-publish.yml — which adds ARM64 runners that these
# encoders don't yet support.
#
# Coordination with the ZPNG workflow: NEITHER workflow calls
# closeAndReleaseSonatypeStagingRepository. With both workflows running in
# parallel on the same push, whichever ran first would close the staging
# repo before the other had finished publishing its artifacts, stranding
# them. Run close-and-release manually after both workflows succeed.
#
# If you ever consolidate back into a single workflow, restore
# closeAndReleaseSonatypeStagingRepository at the end of the publish job.

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:

  # === Lint & check (Java only, no native) =============================
  ci:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 23
        uses: actions/setup-java@v5
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Gradle check
        run: ./gradlew check -x :maven-test:check

  # === Build native libs on each platform ==============================
  # Expiration: The macos-15-intel label works until August 2027. After that, GitHub drops x86_64 macOS runners entirely.
  build-native:
    name: Native (${{ matrix.os }})
    needs: ci
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-15-intel ]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 23
        uses: actions/setup-java@v5
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      # stageNativeLibForJar (defined in fpng/build.gradle and fpnge/build.gradle)
      # produces build/native-jar-staging/<os>/<arch>/[stripped/]<file> on each
      # platform. Preserves cpp-library's natural output structure; no OS
      # detection in either the Gradle task or this workflow.
      - name: Build and stage FPNG and FPNGE native libs
        run: ./gradlew :fpng:stageNativeLibForJar :fpnge:stageNativeLibForJar

      - name: Upload FPNG native artifact
        uses: actions/upload-artifact@v7
        with:
          name: fpng-${{ matrix.os }}
          if-no-files-found: error
          path: fpng/build/native-jar-staging/**

      - name: Upload FPNGE native artifact
        uses: actions/upload-artifact@v7
        with:
          name: fpnge-${{ matrix.os }}
          if-no-files-found: error
          path: fpnge/build/native-jar-staging/**

  # === Bundle native libs into JARs and publish ========================
  publish:
    name: Publish
    needs: build-native
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 23
        uses: actions/setup-java@v5
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      # Download into src/main/resources/lib/<n>/ -- NOT build/resources/.
      # processResources owns build/resources/main/ and would delete files
      # there that aren't produced by a tracked task. Putting them under
      # src/main/resources makes them legitimate source resources that
      # processResources copies through into the JAR.
      #
      # Each platform's artifact contains <os>/<arch>/[stripped/]<file>.
      # merge-multiple overlays all three into one tree.
      - name: Download all FPNG native artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: fpng-*
          path: fpng-java/src/main/resources/lib/fpng
          merge-multiple: true

      - name: Download all FPNGE native artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: fpnge-*
          path: fpnge-java/src/main/resources/lib/fpnge
          merge-multiple: true

      # Fail fast if any platform's lib didn't make it. Last line of defense
      # before signing -- much better than publishing a broken JAR.
      - name: Verify native libs
        shell: bash
        run: |
          echo "=== FPNG ==="
          find fpng-java/src/main/resources/lib -type f | sort
          echo "=== FPNGE ==="
          find fpnge-java/src/main/resources/lib -type f | sort

          fail=0
          for name in fpng fpnge; do
            base="${name}-java/src/main/resources/lib/${name}"
            for expected in \
                "linux/x86-64/stripped/lib${name}.so" \
                "macos/x86-64/stripped/lib${name}.dylib" \
                "windows/x86-64/${name}.dll"; do
              if [ ! -f "${base}/${expected}" ]; then
                echo "ERROR: missing ${base}/${expected}" >&2
                fail=1
              fi
            done
          done
          [ "$fail" -eq 0 ] || exit 1

      - name: Install Gradle properties
        env:
          GRADLE_PROPERTIES: ${{ secrets.GRADLE_PROPERTIES }}
        run: |
          mkdir -p ~/.gradle
          printf '%s\n' "$GRADLE_PROPERTIES" > ~/.gradle/gradle.properties
          echo "GRADLE_USER_HOME=$HOME/.gradle" >> "$GITHUB_ENV"

      - name: Install GPG signing key
        env:
          GPG_SECRET_KEY: ${{ secrets.OSSRH_GPG_SECRET_KEY }}
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          printf '%s\n' "$GPG_SECRET_KEY" | gpg --batch --import
          gpg --export-secret-keys -o ~/.gnupg/secring.gpg

      # Skip copyNativeLib -- it's a local-dev convenience that on the Linux
      # publish runner would only produce Linux libs and write them over the
      # multi-platform tree we just assembled in src/main/resources/.
      #
      # Note: closeAndReleaseSonatypeStagingRepository is intentionally NOT
      # called here. With FPNG/FPNGE and ZPNG publishing from separate
      # parallel workflows on the same push, neither workflow can safely
      # close-and-release: whichever runs first would strand the other's
      # artifacts in an open staging repo. Run the close-and-release step
      # manually once both workflows have completed, e.g.
      #
      #   ./gradlew closeAndReleaseSonatypeStagingRepository
      #
      # from a local checkout against the published GRADLE_PROPERTIES.
      # Or merge the two workflows back into one — in which case put the
      # close-and-release back at the end of the unified publish job.
      - name: Publish to GitHub Packages and Maven Central
        run: >-
          ./gradlew
          :encoder-java:publish
          :fpng-java:publish
          :fpnge-java:publish
          :fpng-java23:publish
          -x :fpng:copyNativeLib
          -x :fpng:stageNativeLibForJar
          -x :fpnge:copyNativeLib
          -x :fpnge:stageNativeLibForJar
        env:
          USERNAME: ${{ github.actor }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Diagnostic: dump the JAR contents so a human can eyeball at-a-glance
      # that the natives shipped at the right paths.
      - name: Inspect built JARs
        shell: bash
        run: |
          for name in fpng fpnge; do
            jar="$(find ${name}-java/build/libs -name "${name}-java-*.jar" \
                   ! -name '*-sources.jar' ! -name '*-javadoc.jar' | head -1)"
            echo "=== ${jar} ==="
            unzip -l "$jar" | grep -E '\.(so|dylib|dll)$' \
              || echo "WARNING: no native libs found in $jar"
          done

  # === Integration test against published artifacts ====================
  # Expiration: The macos-15-intel label works until August 2027. After that, GitHub drops x86_64 macOS runners entirely.
  test:
    name: Integration test (${{ matrix.os }})
    needs: publish
    continue-on-error: true
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-15-intel ]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 23
        uses: actions/setup-java@v5
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run maven-test suite
        run: ./gradlew --no-build-cache --refresh-dependencies :maven-test:test