plugins {
    id 'cpp-library'
}

repositories {
    mavenCentral()
}

library {
    linkage = [Linkage.STATIC, Linkage.SHARED]
    targetMachines = [
            machines.linux.x86_64,
            machines.windows.x86, machines.windows.x86_64,
            machines.macOS.x86_64
            // depends on NEON for SSE/AVX intrinsics and needs changes in the C++ sources
            // , machines.macOS.architecture("aarch64")
    ]
}

// PGO Prepare
// -fprofile-dir=/data/pgo -fprofile-generate=/data/pgo

// PGO Apply
// -fprofile-dir=/data/pgo -fprofile-use=/data/pgo -fprofile-correction

tasks.withType(CppCompile).configureEach {
    debuggable = false
    optimized = true
    compilerArgs.addAll toolChain.map { toolChain ->
        if (toolChain in VisualCpp) {
            return ['/LD', '/EHsc', '/Ox', '/std:c++17', '/W4', '/arch:SSE2']
        } else {
            return ['-fPIC', '-O3', '-march=x86-64', '-mtune=generic', '-funroll-loops', '-std=c++17', '-Wall', '-msse4.2', '-mpclmul', '-msse2', '-mno-avx', '-mno-avx2', '-fno-strict-aliasing']
        }
    }
}

tasks.withType(LinkSharedLibrary).configureEach {
    linkerArgs.addAll toolChain.map { toolChain ->
        if (toolChain in Gcc) {
            return ['-lgcov', '--coverage' /*, '-lasan'*/]
        } else {
            return []
        }
    }
}

tasks.register('copyNativeLib', Copy) {
    dependsOn assemble
    //from './build/lib/main/debug/shared'
    from './build/lib/main/release/shared'
    into '../fpng-java/build/resources/main/lib/fpng'

    // the native library file extensions on different platforms
    include '**/*.dll', '**/*.so', '**/*.dylib'
    duplicatesStrategy=DuplicatesStrategy.INCLUDE
}

